  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0D0D0D">

  <!-- Firebase SDK (ES Modules via CDN) -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
      from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import { getDatabase, ref, set, get, onValue, off }
      from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

    // メインスクリプト（非モジュール）へのブリッジ
    // window.FB_SDK にAPIをまとめて公開する
    window.FB_SDK = {
      initializeApp, getAuth, GoogleAuthProvider, signInWithPopup, signOut,
      onAuthStateChanged, getDatabase, ref, set, get, onValue, off,
      // アプリインスタンスは設定後に格納
      _app: null, _auth: null, _db: null,

      // Firebase初期化（設定が揃ったら呼ぶ）
      init(cfg) {
        try {
          this._app = initializeApp(cfg, 'wtodo');
          this._auth = getAuth(this._app);
          this._db = getDatabase(this._app);
          return true;
        } catch (e) {
          console.error('[FB_SDK] init error:', e);
          return false;
        }
      },

      // Googleログイン
      async signInWithGoogle() {
        const provider = new GoogleAuthProvider();
        return signInWithPopup(this._auth, provider);
      },

      // ログアウト
      async signOut() {
        return signOut(this._auth);
      },

      // 認証状態の監視
      onAuthStateChanged(cb) {
        if (!this._auth) return () => { };
        return onAuthStateChanged(this._auth, cb);
      },

      // データ書き込み
      async setData(uid, data) {
        const r = ref(this._db, 'users/' + uid + '/data');
        return set(r, data);
      },

      // データ読み込み（1回）
      async getData(uid) {
        const r = ref(this._db, 'users/' + uid + '/data');
        const snap = await get(r);
        return snap.exists() ? snap.val() : null;
      },

      // リアルタイム監視開始
      onDataChange(uid, cb) {
        const r = ref(this._db, 'users/' + uid + '/data');
        onValue(r, snap => { if (snap.exists()) cb(snap.val()); });
        // cleanup関数を返す
        return () => off(r);
      },
    };

    // メインスクリプトの初期化完了を待ってFirebase自動初期化を試みる
    window.addEventListener('wtodo-ready', () => {
      if (typeof window.wtodoFirebaseInit === 'function') {
        window.wtodoFirebaseInit();
      }
    });
  </script>

    .task-item.done .task-text {
      text-decoration: line-through;
      color: var(--text-done)
    }

    /* inline edit input */
    .task-edit-inp {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--accent);
      border-radius: 4px;
      color: var(--text);
      font-size: .96rem;
      font-family: var(--sans);
      padding: 2px 6px;
      outline: none
    }

    .recur-icon {
      font-size: 1.05rem;
      color: var(--accent);
      flex-shrink: 0;
      cursor: pointer;
      padding: 6px 3px;
      transition: opacity .15s
    }

    .recur-icon:hover {
      opacity: .7
    }

    .edit-btn {
      background: none;
      border: none;
      color: var(--text-sub);
      font-size: 1.05rem;
      cursor: pointer;
      padding: 6px 4px;
      transition: color .15s;
      flex-shrink: 0;
      opacity: .5
    }

    .edit-btn:active {
      color: var(--accent);
      opacity: 1
    }

    .del-btn {
      background: none;
      border: none;
      color: var(--text-sub);
      font-size: .8rem;
      cursor: pointer;
      padding: 6px 4px;
      transition: color .15s;
      flex-shrink: 0;
      opacity: .5
    }

    .del-btn:active {
      color: var(--danger);
      opacity: 1
    }

    /* add row */
    .add-row {
      display: flex;
      gap: 6px;
      padding: 6px 10px 6px 12px;
      border-top: 1px solid var(--border)
    }

    .add-row:focus-within {
      background: var(--surface2)
    }

    .add-inp {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: .94rem;
      font-family: var(--sans);
      outline: none
    }

    .add-inp::placeholder {
      color: var(--text-sub)
    }

    .add-row-btn {
      background: none;
      border: none;
      color: var(--text-sub);
      font-size: 1.05rem;
      cursor: pointer;
      padding: 2px 4px;
      transition: color .15s;
      border-radius: 3px
    }

    .add-row-btn:hover {
      color: var(--accent)
    }

    .recur-toggle {
      background: none;
      border: 1px solid transparent;
      color: var(--text-sub);
      font-size: .75rem;
      cursor: pointer;
      padding: 2px 5px;
      border-radius: 3px;
      transition: all .15s;
      font-family: var(--mono)
    }

    .recur-toggle.on {
      color: var(--accent);
      border-color: var(--accent-dim)
    }

    /* ── modals ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .75);
      z-index: 400;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px
    }

    .overlay.open {
      display: flex
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 20px;
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 14px
    }

    .modal-title {
      font-family: var(--mono);
      font-size: .94rem;
      color: var(--accent);
      letter-spacing: .1em;
      text-transform: uppercase
    }

    .modal-field {
      display: flex;
      flex-direction: column;
      gap: 5px
    }

    .modal-label {
      font-size: .85rem;
      color: var(--text-sub)
    }

    .modal-inp {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--r);
      color: var(--text);
      font-size: 1rem;
      font-family: var(--sans);
      padding: 8px 10px;
      outline: none;
      transition: border-color .15s;
      width: 100%
    }

    .modal-inp:focus {
      border-color: var(--accent)
    }

    .modal-inp[type=date] {
      color-scheme: dark
    }

    .modal-row {
      display: flex;
      gap: 8px;
      justify-content: flex-end
    }

    .modal-cancel {
      background: none;
      border: 1px solid var(--border2);
      color: var(--text-sub);
      border-radius: var(--r);
      padding: 7px 16px;
      font-size: .94rem;
      cursor: pointer;
      transition: all .15s
    }

    .modal-cancel:hover {
      color: var(--text);
      border-color: var(--text-sub)
    }

    .modal-submit {
      background: var(--accent);
      color: #0D0D0D;
      border: none;
      border-radius: var(--r);
      padding: 7px 16px;
      font-size: .94rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s
    }

    .modal-submit:hover {
      opacity: .85
    }

    /* day checkboxes in recur modal */
    .day-checks {
      display: flex;
      gap: 6px;
      flex-wrap: wrap
    }

    .day-check-label {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 1.05rem;
      cursor: pointer;
      padding: 4px 8px;
      border: 1px solid var(--border2);
      border-radius: 4px;
      transition: all .15s;
      user-select: none
    }

    .day-check-label:hover {
      border-color: var(--accent)
    }

    .day-check-label input {
      display: none
    }

    .day-check-label.checked {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim)
    }

    /* fab */
    .fab-group {
      position: fixed;
      bottom: 72px;
      right: 24px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
      z-index: 200
    }

    .fab {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--accent);
      color: #0D0D0D;
      border: none;
      font-size: 1.6rem;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(126, 232, 162, .25);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .15s, box-shadow .15s
    }

    .fab:hover {
      transform: scale(1.08)
    }

    .fab-subs {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s, transform .2s;
      transform: translateY(8px)
    }

    .fab-group.open .fab-subs {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0)
    }

    .fab-sub-btn {
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 1.05rem;
      cursor: pointer;
      white-space: nowrap;
      transition: all .15s;
      display: flex;
      align-items: center;
      gap: 6px
    }

    .fab-sub-btn:hover {
      border-color: var(--accent);
      color: var(--accent)
    }

    .shortcuts {
      position: fixed;
      bottom: 130px;
      right: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 8px 12px;
      font-family: var(--mono);
      font-size: 1.05rem;
      color: var(--text-sub);
      line-height: 1.8;
      z-index: 199;
      display: none;
      box-shadow: 0 4px 16px rgba(0, 0, 0, .5)
    }

    .shortcuts.visible {
      display: block
    }

    .shortcuts kbd {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 3px;
      padding: 0 4px;
      color: var(--text)
    }

    .toast {
      position: fixed;
      bottom: 130px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--r);
      padding: 7px 14px;
      font-size: 1.05rem;
      color: var(--text);
      opacity: 0;
      transition: opacity .2s, transform .2s;
      pointer-events: none;
      z-index: 300;
      white-space: nowrap
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0)
    }

    /* ── freq task cards ── */
    .freq-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 4px
    }

    .freq-empty {
      font-size: .85rem;
      color: var(--text-sub);
      padding: 10px 2px
    }

    .freq-card {
      border-radius: var(--r);
      border: 1px solid var(--border);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100px;
    }

    /* top 2/3: tap area */
    .freq-card-top {
      flex: 2;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 10px 10px 0 10px;
      background: var(--surface);
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      position: relative;
      transition: background .2s;
    }

    .freq-card-top.achieved {
      background: var(--accent-dim)
    }

    .freq-card-title {
      font-size: .94rem;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }

    .freq-card-top.achieved .freq-card-title {
      color: var(--accent)
    }

    .freq-card-count {
      font-family: var(--mono);
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text-sub);
      text-align: right;
      padding-bottom: 6px;
      line-height: 1;
    }

    .freq-card-top.achieved .freq-card-count {
      color: var(--accent)
    }

    /* progress bar sits between top and bottom */
    .freq-card-bar {
      height: 3px;
      background: var(--border2);
      flex-shrink: 0
    }

    .freq-card-bar-fill {
      height: 100%;
      background: var(--accent);
      transition: width .4s
    }

    /* bottom 1/3: meta + actions */
    .freq-card-bot {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 0 6px 0 10px;
      background: var(--surface2);
      border-top: 1px solid var(--border);
    }

    .freq-card-type {
      font-family: var(--mono);
      font-size: .62rem;
      color: var(--text-sub);
      flex: 1;
      white-space: nowrap;
    }

    .freq-card-edit {
      background: none;
      border: none;
      color: var(--text-sub);
      cursor: pointer;
      padding: 5px 3px;
      opacity: .5;
      flex-shrink: 0
    }

    .freq-card-edit:active {
      color: var(--accent);
      opacity: 1
    }

    .freq-card-del {
      background: none;
      border: none;
      color: var(--text-sub);
      cursor: pointer;
      padding: 5px 3px;
      opacity: .5;
      flex-shrink: 0
    }

    .freq-card-del:active {
      color: var(--danger);
      opacity: 1
    }

    /* tap feedback */
    .freq-card-top:active {
      filter: brightness(1.15)
    }

    /* ── home page ── */
    .home-streak {
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      border-radius: var(--r);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px
    }

    .home-streak-num {
      font-family: var(--mono);
      font-size: 2rem;
      font-weight: 600;
      color: var(--accent);
      line-height: 1
    }

    .home-streak-label {
      font-size: .82rem;
      color: var(--accent)
    }

    .home-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      margin-bottom: 10px;
      overflow: hidden
    }

    .home-sec-head {
      display: flex;
      align-items: center;
      padding: 10px 12px 8px;
      border-bottom: 1px solid var(--border)
    }

    .home-sec-title {
      font-family: var(--mono);
      font-size: .72rem;
      color: var(--text-sub);
      letter-spacing: .08em;
      text-transform: uppercase;
      flex: 1
    }

    .home-sec-goto {
      background: none;
      border: none;
      color: var(--text-sub);
      font-size: .72rem;
      font-family: var(--mono);
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      gap: 3px;
      transition: color .15s
    }

    .home-sec-goto:active {
      color: var(--accent)
    }

    .home-sec-body {
      padding: 8px 12px 10px
    }

    /* today progress */
    .home-today-bar-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px
    }

    .home-today-bar {
      flex: 1;
      height: 5px;
      background: var(--border2);
      border-radius: 3px;
      overflow: hidden
    }

    .home-today-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      transition: width .4s
    }

    .home-today-label {
      font-family: var(--mono);
      font-size: .8rem;
      color: var(--text-sub);
      white-space: nowrap
    }

    .home-task-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      border-bottom: 1px solid var(--border)
    }

    .home-task-row:last-child {
      border-bottom: none
    }

    .home-task-cb {
      width: 15px;
      height: 15px;
      border-radius: 3px;
      border: 1.5px solid var(--border2);
      flex-shrink: 0;
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
      position: relative;
      transition: all .15s;
      background: transparent
    }

    .home-task-cb:checked {
      background: var(--accent);
      border-color: var(--accent)
    }

    .home-task-cb:checked::after {
      content: '';
      position: absolute;
      left: 2px;
      top: 0;
      width: 7px;
      height: 4px;
      border-left: 1.5px solid #0D0D0D;
      border-bottom: 1.5px solid #0D0D0D;
      transform: rotate(-45deg)
    }

    .home-task-text {
      flex: 1;
      font-size: .88rem;
      color: var(--text);
      cursor: pointer
    }

    .home-task-text.done {
      text-decoration: line-through;
      color: var(--text-done)
    }

    .home-more {
      font-size: .76rem;
      color: var(--text-sub);
      padding-top: 4px;
      font-family: var(--mono)
    }

    /* home freq mini */
    .home-freq-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px
    }

    .home-freq-mini {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 4px
    }

    .home-freq-mini.achieved {
      border-color: var(--accent-dim);
      background: var(--accent-dim)
    }

    .home-freq-mini-title {
      font-size: .82rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .home-freq-mini.achieved .home-freq-mini-title {
      color: var(--accent)
    }

    .home-freq-mini-count {
      font-family: var(--mono);
      font-size: .76rem;
      color: var(--text-sub)
    }

    .home-freq-mini.achieved .home-freq-mini-count {
      color: var(--accent)
    }

    .home-freq-mini-bar {
      height: 2px;
      background: var(--border2);
      border-radius: 1px;
      overflow: hidden
    }

    .home-freq-mini-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 1px
    }

    /* home dl row */
    .home-dl-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid var(--border)
    }

    .home-dl-row:last-child {
      border-bottom: none
    }

    .home-dl-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0
    }

    .home-dl-text {
      flex: 1;
      font-size: .88rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .home-dl-badge {
      font-family: var(--mono);
      font-size: .68rem;
      border-radius: 3px;
      padding: 1px 5px;
      border: 1px solid;
      white-space: nowrap;
      flex-shrink: 0
    }

    .home-dl-badge.overdue,
    .home-dl-badge.today-due {
      color: var(--danger);
      border-color: var(--danger);
      background: rgba(255, 85, 85, .1)
    }

    .home-dl-badge.soon {
      color: var(--warn);
      border-color: var(--warn);
      background: rgba(240, 165, 0, .1)
    }

    .home-dl-badge.future {
      color: var(--text-sub);
      border-color: var(--border2)
    }

    /* home period row */
    .home-pd-row {
      padding: 6px 0;
      border-bottom: 1px solid var(--border)
    }

    .home-pd-row:last-child {
      border-bottom: none
    }

    .home-pd-title {
      font-size: .88rem;
      color: var(--text);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .home-pd-meta {
      display: flex;
      align-items: center;
      gap: 6px
    }

    .home-pd-bar {
      flex: 1;
      height: 3px;
      background: var(--border2);
      border-radius: 2px;
      overflow: hidden
    }

    .home-pd-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px
    }

    .home-pd-label {
      font-family: var(--mono);
      font-size: .68rem;
      color: var(--text-sub);
      white-space: nowrap
    }

    .home-empty {
      font-size: .82rem;
      color: var(--text-done);
      font-style: italic
    }

    /* ── settings page ── */
    .settings-page {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 4px 0 20px
    }

    .settings-group {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden
    }

    .settings-group-title {
      font-family: var(--mono);
      font-size: .68rem;
      color: var(--text-sub);
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 10px 14px 4px
    }

    .settings-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-top: 1px solid var(--border)
    }

    .settings-row:first-of-type {
      border-top: none
    }

    .settings-row-label {
      flex: 1;
      font-size: .9rem;
      color: var(--text);
      line-height: 1.3
    }

    .settings-row-sub {
      font-size: .75rem;
      color: var(--text-sub);
      margin-top: 2px
    }

    .settings-row-val {
      font-family: var(--mono);
      font-size: .78rem;
      color: var(--text-sub);
      white-space: nowrap
    }

    .toggle-wrap {
      position: relative;
      width: 44px;
      height: 24px;
      flex-shrink: 0
    }

    .toggle-wrap input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--border2);
      border-radius: 12px;
      cursor: pointer;
      transition: background .2s
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform .2s
    }

    .toggle-wrap input:checked+.toggle-slider {
      background: var(--accent)
    }

    .toggle-wrap input:checked+.toggle-slider::before {
      transform: translateX(20px)
    }

    .sync-mode-options {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px 14px 14px
    }

    .sync-radio-label {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      cursor: pointer;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--r);
      transition: border-color .15s
    }

    .sync-radio-label.selected {
      border-color: var(--accent);
      background: var(--accent-dim)
    }

    .sync-radio-label input {
      margin-top: 3px;
      accent-color: var(--accent);
      flex-shrink: 0
    }

    .sync-radio-title {
      font-size: .88rem;
      color: var(--text);
      font-weight: 500
    }

    .sync-radio-desc {
      font-size: .75rem;
      color: var(--text-sub);
      margin-top: 2px
    }

    .firebase-config {
      display: flex;
      flex-direction: column;
      gap: 0;
      border-top: 1px solid var(--border)
    }

    .firebase-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border)
    }

    .firebase-field:last-child {
      border-bottom: none
    }

    .firebase-label {
      font-size: .72rem;
      color: var(--text-sub);
      font-family: var(--mono)
    }

    .firebase-input {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--r);
      color: var(--text);
      font-size: .84rem;
      font-family: var(--mono);
      padding: 7px 10px;
      outline: none;
      transition: border-color .15s;
      width: 100%
    }

    .firebase-input:focus {
      border-color: var(--accent)
    }

    .sync-status {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 14px;
      font-size: .82rem
    }

    .sync-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0
    }

    .sync-dot.connected {
      background: var(--accent)
    }

    .sync-dot.disconnected {
      background: var(--text-sub)
    }

    .sync-dot.error {
      background: var(--danger)
    }

    .sync-dot.syncing {
      background: var(--warn);
      animation: pulse .8s infinite
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .4
      }
    }

    .sync-status-text {
      flex: 1;
      color: var(--text-sub)
    }

    .sync-last {
      font-family: var(--mono);
      font-size: .72rem;
      color: var(--text-sub)
    }

    .settings-btn {
      width: 100%;
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 0;
      padding: 12px 14px;
      font-size: .88rem;
      font-family: var(--sans);
      cursor: pointer;
      text-align: left;
      transition: all .15s;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: none
    }

    .settings-btn:first-child {
      border-top: 1px solid var(--border)
    }

    .settings-btn:last-child {
      border-bottom: 1px solid var(--border)
    }

    .settings-btn:active {
      color: var(--accent)
    }

    .settings-btn.danger {
      color: var(--danger)
    }

    .settings-version {
      font-family: var(--mono);
      font-size: .72rem;
      color: var(--text-sub);
      text-align: center;
      padding: 4px 0 0
    }

    /* ── sync indicator ── */
    .sync-indicator {
      font-family: var(--mono);
      font-size: .65rem;
      display: flex;
      align-items: center;
      gap: 4px;
      flex: 1;
      /* push hdr-right to the right */
      padding-left: 8px;
      opacity: 0;
      transition: opacity .3s;
      white-space: nowrap;
      overflow: hidden;
    }

    .sync-indicator.visible {
      opacity: 1
    }

    .sync-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: background .3s;
    }

    .sync-indicator.syncing .sync-dot {
      background: var(--warn);
      animation: pulse .8s infinite
    }

    .sync-indicator.synced .sync-dot {
      background: var(--accent)
    }

    .sync-indicator.error .sync-dot {
      background: var(--danger)
    }

    .sync-indicator.offline .sync-dot {
      background: var(--text-sub)
    }

    .sync-indicator.syncing .sync-text {
      color: var(--warn)
    }

    .sync-indicator.synced .sync-text {
      color: var(--accent)
    }

    .sync-indicator.error .sync-text {
      color: var(--danger)
    }

    .sync-indicator.offline .sync-text {
      color: var(--text-sub)
    }

    .sync-text {
      font-size: .65rem
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .3
      }
    }

    /* ── offline banner ── */
    .offline-banner {
      background: #1A1200;
      border-bottom: 1px solid var(--warn);
      color: var(--warn);
      font-size: .78rem;
      font-family: var(--mono);
      padding: 6px 16px;
      text-align: center;
      display: none;
    }

    .offline-banner.show {
      display: block
    }


    button:active .ih-icon {
      transform: scale(.88)
    }

    /* trash: lid opens on parent:active */
    button:active .ih-trash .lid-lower {
      transform: rotate(-25deg) translateY(-4px);
      transform-origin: 50% 100%
    }

    button:active .ih-trash .lid-upper {
      transform: rotate(-35deg) translate(-2px, -6px);
      transform-origin: 50% 100%
    }

    .ih-trash path {
      transition: transform .25s
    }

    /* pen: tilt on active */
    button:active .ih-pen {
      transform: rotate(-15deg) scale(.9)
    }

    /* refresh: spin on active */
    button:active .ih-refresh {
      transform: rotate(180deg)
    }

    /* arrow: slide right on active */
    button:active .ih-arrow-right {
      transform: translateX(3px)
    }

    /* chevron-down: bounce down */
    button:active .ih-chevron-down {
      transform: translateY(2px)
    }

    /* chevron-left/right: slide */
    button:active .ih-chevron-left {
      transform: translateX(-2px)
    }

    button:active .ih-chevron-right {
      transform: translateX(2px)
    }

    /* plus: grow */
    .fab:active .ih-plus {
      transform: rotate(45deg) scale(1.1)
    }

    /* download arrow bounce */
    button:active .ih-download .arrow {
      transform: translateY(2px)
    }

    button:active .ih-upload .arrow {
      transform: translateY(-2px)
    }

    .ih-download path,
    .ih-upload path {
      transition: transform .2s
    }
  </style>
</head>

  <script>
    // ══ CONSTANTS ════════════════════════════════════════════════════════════════

    const STORE = 'wtodo_v4';
    const FB_STORE = 'wtodo_firebase_config'; // Firebase設定専用（エクスポート対象外）
    const DAY_LABELS = ['日', '月', '火', '水', '木', '金', '土'];
    const FREQ_TYPES = ['weekly', 'monthly', 'yearly'];
    const FREQ_TITLES = { weekly: '週次タスク', monthly: '月次タスク', yearly: '年次タスク' };

    const ICONS = {
      pen: '<svg class="ih-icon ih-pen" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15.502 5.093a2.073 2.073 0 1 1 2.93 2.927l-9.483 9.483-3.95 1.023 1.022-3.95z" fill="none"/></svg>',
      trash: '<svg class="ih-icon ih-trash" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path class="lid-lower" d="M4 7l16 0" fill="none"/><path d="M10 11l0 6" fill="none"/><path d="M14 11l0 6" fill="none"/><path d="M5 7l1 12a2 2 0 0 0 2 2h8a2 2 0 0 0 2 -2l1 -12" fill="none"/><path class="lid-upper" d="M9 7v-3a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v3" fill="none"/></svg>',
      repeat: '<svg class="ih-icon ih-repeat" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v-3a3 3 0 0 1 3 -3h13m-3 -3l3 3l-3 3" fill="none"/><path d="M20 12v3a3 3 0 0 1 -3 3h-13m3 3l-3 -3l3 -3" fill="none"/></svg>',
      arrow: '<svg class="ih-icon ih-arrow-right" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l14 0" fill="none"/><path d="M15 16l4 -4l-4 -4" fill="none"/></svg>',
      chevDown: '<svg class="ih-icon ih-chevron-down" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6l6 -6" fill="none"/></svg>',
      chevDownSm: '<svg class="ih-icon ih-chevron-down freq-collapse" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6l6 -6" fill="none"/></svg>',
      x: '<svg class="ih-icon ih-x" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6l-12 12" fill="none"/><path d="M6 6l12 12" fill="none"/></svg>',
      repeatRow: '<svg class="ih-icon ih-repeat" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v-3a3 3 0 0 1 3 -3h13m-3 -3l3 3l-3 3" fill="none"/><path d="M20 12v3a3 3 0 0 1 -3 3h-13m3 3l-3 -3l3 -3" fill="none"/></svg>',
      arrowRow: '<svg class="ih-icon ih-arrow-right" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l14 0" fill="none"/><path d="M15 16l4 -4l-4 -4" fill="none"/></svg>',
    };

    // ══ DATA / STORAGE ════════════════════════════════════════════════════════════

    function init() {
      return {
        tasks: {}, deadlines: [], periods: [], freqTasks: [], recurring: [],
        carried: {}, streak: { lastDoneDate: '', count: 0 },
        dlVisible: true, dlShowDone: false, pdShowDone: false,
        updatedAt: 0, // Unix ms timestamp — 競合解決に使用
      };
    }

    // Firebase設定（アプリデータとは分離保存）
    function loadFbConfig() {
      try { return JSON.parse(localStorage.getItem(FB_STORE) || 'null') || null; }
      catch { return null; }
    }
    function saveFbConfig(cfg) {
      if (cfg) localStorage.setItem(FB_STORE, JSON.stringify(cfg));
      else localStorage.removeItem(FB_STORE);
    }

    // ── StorageAdapter ────────────────────────────────────────────────────────────
    class StorageAdapter {
      constructor() {
        this.mode = 'local';   // 'local' | 'firebase'
        this.db = null;      // Firebase DB reference（Step3で設定）
        this.uid = null;      // Firebase UID（Step3で設定）
        this._remoteUnsubscribe = null; // Firebase listener cleanup
        this._lastSavedJson = null;     // 重複保存防止
        this._pendingSync = false;    // オフライン時のsync保留フラグ
      }

      // ── ローカル読み込み
      loadLocal() {
        try {
          return Object.assign(init(), JSON.parse(localStorage.getItem(STORE) || 'null') || {});
        } catch { return init(); }
      }

      // ── ローカル書き込み
      saveLocal(data) {
        localStorage.setItem(STORE, JSON.stringify(data));
      }

      // ── 保存（モードに応じて振り分け）
      save(data) {
        // タイムスタンプを更新
        data.updatedAt = Date.now();

        const json = JSON.stringify(data);

        // 常にlocalStorageに即時保存（オフライン保険）
        localStorage.setItem(STORE, json);

        // Firebase モードかつ接続済みの場合は非同期でFirebaseにも保存
        if (this.mode === 'firebase' && this.db && this.uid) {
          if (json === this._lastSavedJson) return;
          this._lastSavedJson = json;
          if (navigator.onLine) {
            this._pushToFirebase(data);
          } else {
            // オフライン → 復帰時に同期するためフラグを立てる
            this._pendingSync = true;
            setSyncIndicator('offline');
          }
        }
      }

      // ── Firebase への書き込み
      _pushToFirebase(data) {
        if (!window.FB_SDK?._db || !this.uid) return;
        setSyncIndicator('syncing');
        window.FB_SDK.setData(this.uid, data)
          .then(() => {
            this._pendingSync = false;
            setSyncIndicator('synced');
          })
          .catch(e => {
            console.warn('[StorageAdapter] Firebase write error:', e);
            this._pendingSync = true;
            setSyncIndicator('error');
          });
      }

      // ── リモート変更の監視開始
      startRemoteListener(onUpdate) {
        this.stopRemoteListener();
        if (!window.FB_SDK?._db || !this.uid) return;
        this._remoteUnsubscribe = window.FB_SDK.onDataChange(this.uid, remoteData => {
          const remoteJson = JSON.stringify(remoteData);
          // 自分の書き込みエコーは無視
          if (remoteJson === this._lastSavedJson) return;

          // 競合解決: updatedAt タイムスタンプで新しい方を採用
          const localTs = DATA.updatedAt || 0;
          const remoteTs = remoteData.updatedAt || 0;

          if (remoteTs > localTs) {
            // リモートが新しい → リモートを採用
            this._lastSavedJson = remoteJson;
            onUpdate(remoteData);
          } else if (remoteTs < localTs) {
            // ローカルが新しい → ローカルをFirebaseに上書き送信
            console.debug('[StorageAdapter] local is newer, pushing to Firebase');
            this._pushToFirebase(DATA);
          }
          // 同タイムスタンプは無視（同一データ）
        });
      }

      // ── リモート変更の監視停止
      stopRemoteListener() {
        if (this._remoteUnsubscribe) {
          this._remoteUnsubscribe();
          this._remoteUnsubscribe = null;
        }
      }

      // ── Firebase モードに切り替え（Step3で呼ぶ）
      setFirebaseMode(db, uid) {
        this.mode = 'firebase';
        this.db = db;
        this.uid = uid;
      }

      // ── ローカルモードに戻す
      setLocalMode() {
        this.stopRemoteListener();
        this.mode = 'local';
        this.db = null;
        this.uid = null;
        this._lastSavedJson = null;
      }

      // ── 接続状態
      get isFirebaseReady() {
        return this.mode === 'firebase' && this.db !== null && this.uid !== null;
      }

      // ── 同期ステータス文字列（Settings画面に表示）
      get statusLabel() {
        if (this.mode === 'local') return 'ローカルのみ';
        if (this.isFirebaseReady) return '✅ Firebase同期中';
        return '⚠️ Firebase未接続';
      }
    }

    // グローバルアダプターインスタンス
    const adapter = new StorageAdapter();

    // ── 既存コードとの互換ラッパー（save/load をアダプター経由に）
    function load() { return adapter.loadLocal(); }
    function save() { adapter.save(DATA); }

    let DATA = load();

    // ══ DATE HELPERS ══════════════════════════════════════════════════════════════

    function today() { const d = new Date(); d.setHours(0, 0, 0, 0); return d; }
    function todayStr() { return ds(today()); }
    function ds(d) { return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate()); }
    function p(n) { return String(n).padStart(2, '0'); }
    function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }
    function getMon(d) { const r = new Date(d); r.setHours(0, 0, 0, 0); const day = r.getDay(); r.setDate(r.getDate() + (day === 0 ? -6 : 1 - day)); return r; }
    function fmtShort(d) { return (d.getMonth() + 1) + '/' + d.getDate(); }
    function weekKey(mon) { return ds(mon); }
    function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
    function parseDate(str) {
      if (!str || typeof str !== 'string') return new Date(NaN);
      const q = str.split('-').map(Number);
      if (q.length !== 3 || q.some(isNaN)) return new Date(NaN);
      const r = new Date(q[0], q[1] - 1, q[2]); r.setHours(0, 0, 0, 0); return r;
    }
    function daysUntil(s) {
      const d = parseDate(s);
      if (isNaN(d)) return 0;
      return Math.round((d - today()) / 86400000);
    }
    function esc(s) { return s.replace(/&/g, '\x26amp;').replace(/</g, '\x26lt;').replace(/>/g, '\x26gt;'); }

    // ══ DOMAIN HELPERS ════════════════════════════════════════════════════════════

    // -- deadline
    function dlUrgency(dl) {
      if (dl.done) return 'done';
      const d = daysUntil(dl.dueDate);
      if (d < 0) return 'overdue';
      if (d === 0) return 'today-due';
      if (d <= 3) return 'soon';
      return 'future';
    }
    function dlLabel(dl) {
      const d = daysUntil(dl.dueDate);
      if (d < 0) return Math.abs(d) + '日超過';
      if (d === 0) return '今日まで';
      if (d === 1) return '明日まで';
      return 'あと' + d + '日';
    }

    // -- period
    function pdUrgency(pd) {
      if (pd.done) return 'done';
      const s = daysUntil(pd.startDate), e = daysUntil(pd.endDate);
      if (e < 0) return 'overdue';
      if (e === 0) return 'today-due';
      if (s > 0) return 'upcoming';
      return 'active';
    }
    function pdLabel(pd) {
      const u = pdUrgency(pd), e = daysUntil(pd.endDate);
      if (u === 'done') return '完了';
      if (u === 'overdue') return Math.abs(e) + '日超過';
      if (u === 'today-due') return '今日まで';
      if (u === 'upcoming') return daysUntil(pd.startDate) + '日後開始';
      return 'あと' + e + '日';
    }
    function pdProgress(pd) {
      const start = parseDate(pd.startDate), end = parseDate(pd.endDate);
      const total = Math.max(1, Math.round((end - start) / 86400000) + 1);
      const elapsed = Math.round((today() - start) / 86400000) + 1;
      return Math.min(100, Math.max(0, Math.round(elapsed / total * 100)));
    }

    // -- freq
    function freqPeriodKey(type, d) {
      d = d || today();
      if (type === 'weekly') {
        // ISO 8601: week containing Thursday, Monday start
        const mon = getMon(d);
        // Find Thursday of this week
        const thu = new Date(mon); thu.setDate(mon.getDate() + 3);
        const y = thu.getFullYear();
        // First Monday of the year containing this Thursday
        const jan4 = new Date(y, 0, 4); // Jan 4 is always in W1
        const w1mon = getMon(jan4);
        const wk = Math.round((mon - w1mon) / 604800000) + 1;
        return y + '-W' + p(wk);
      }
      if (type === 'monthly') return d.getFullYear() + '-' + p(d.getMonth() + 1);
      return String(d.getFullYear());
    }
    function freqGetCount(ft, key) { return (ft.logs && ft.logs[key]) || 0; }
    function freqAddCount(ft, key, delta) {
      if (!ft.logs) ft.logs = {};
      ft.logs[key] = Math.max(0, (ft.logs[key] || 0) + delta);
    }
    function freqTypeLabel(type) {
      return type === 'weekly' ? '週次' : type === 'monthly' ? '月次' : '年次';
    }

    // -- recurring
    function injectRecurring(monday) {
      const wk = '_recur_' + weekKey(monday);
      if (DATA.carried[wk]) return;
      for (const rec of DATA.recurring) {
        for (const dayIdx of rec.days) {
          const offset = dayIdx === 0 ? 6 : dayIdx - 1;
          const d = addDays(monday, offset);
          const key = ds(d);
          if (!DATA.tasks[key]) DATA.tasks[key] = [];
          if (!DATA.tasks[key].some(t => t.recurId === rec.id))
            DATA.tasks[key].push({ id: uid(), text: rec.text, done: false, recurId: rec.id });
        }
      }
      DATA.carried[wk] = true; save();
    }

    // clean up carried keys older than 60 days (run once on startup)
    function cleanCarried() {
      const cutoff = addDays(today(), -60);
      let changed = false;
      for (const key of Object.keys(DATA.carried)) {
        // key format: "_recur_YYYY-MM-DD" or "carry_YYYY-MM-DD"
        const dateStr = key.replace(/^(_recur_|carry_)/, '');
        const d = parseDate(dateStr);
        if (!isNaN(d) && d < cutoff) { delete DATA.carried[key]; changed = true; }
      }
      if (changed) save();
    }

    // -- streak
    function updateStreak() {
      const td = todayStr(), tasks = DATA.tasks[td] || [];
      if (tasks.length > 0 && tasks.every(t => t.done) && DATA.streak.lastDoneDate !== td) {
        const yest = ds(addDays(today(), -1));
        DATA.streak.count = (DATA.streak.lastDoneDate === yest) ? DATA.streak.count + 1 : 1;
        DATA.streak.lastDoneDate = td; save();
      }
    }

    const SVG_DOWNLOAD = '<svg class="ih-icon ih-download" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2 -2v-2" fill="none"/><path class="arrow" d="M7 11l5 5l5 -5" fill="none"/><path d="M12 4l0 12" fill="none"/></svg>';
    const SVG_UPLOAD = '<svg class="ih-icon ih-upload" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2 -2v-2" fill="none"/><path class="arrow" d="M7 9l5 -5l5 5" fill="none"/><path d="M12 4l0 12" fill="none"/></svg>';

    function navigateTo(page) {
      if (page === 'home') offsetWeeks = 0; // always show current week context on home
      currentPage = page;
      render();
    }

    function render() {
      const mon = addDays(getMon(today()), offsetWeeks * 7);
      const sun = addDays(mon, 6);
      injectRecurring(mon);
      updateStreak();

      // dynamic header
      document.getElementById('hdrRight').innerHTML = HDR[currentPage]();
      wireHeaderButtons(mon, sun);

      // active nav
      document.querySelectorAll('.bnav-item').forEach(btn =>
        btn.classList.toggle('active', btn.dataset.page === currentPage));

      // body
      const body = document.getElementById('body');
      body.innerHTML = '';
      body.scrollTop = 0;

      switch (currentPage) {
        case 'home': body.appendChild(buildHomePage(mon, sun)); break;
        case 'freq': body.appendChild(buildFreqSections()); break;
        case 'deadline': body.appendChild(buildDeadlineSection(mon, sun)); break;
        case 'period': body.appendChild(buildPeriodSection(mon, sun)); break;
        case 'week': renderWeekPage(body, mon, sun); break;
        case 'settings': body.appendChild(buildSettingsPage()); break;
      }
      updateNavBadges();
    }

    function wireHeaderButtons(mon, sun) {
      // week nav
      const prev = document.getElementById('prev');
      const next = document.getElementById('next');
      const goToday = document.getElementById('goToday');
      if (prev) { prev.disabled = offsetWeeks <= -12; prev.onclick = () => { offsetWeeks--; render(); }; }
      if (next) { next.disabled = offsetWeeks >= 52; next.onclick = () => { offsetWeeks++; render(); }; }
      if (goToday) { goToday.onclick = () => { offsetWeeks = 0; render(); }; }
      const wrange = document.getElementById('wrange');
      if (wrange) wrange.textContent = fmtShort(mon) + '–' + fmtShort(addDays(mon, 6));
      // deadline toggle
      const tdh = document.getElementById('toggleDlDoneHdr');
      if (tdh) tdh.onclick = () => { DATA.dlShowDone = !DATA.dlShowDone; save(); render(); };
      // period toggle
      const tph = document.getElementById('togglePdDoneHdr');
      if (tph) tph.onclick = () => { DATA.pdShowDone = !DATA.pdShowDone; save(); render(); };
      // export/import
      const exp = document.getElementById('exportBtn');
      if (exp) exp.onclick = () => {
        const blob = new Blob([JSON.stringify(DATA, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'wtodo-' + todayStr() + '.json';
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url); toast('書き出しました');
      };
      const imp = document.getElementById('importBtn');
      if (imp) imp.onclick = () => document.getElementById('importFile').click();
    }

    function renderWeekPage(body, mon, sun) {
      const carryEl = buildCarryBanner(mon, weekKey(mon));
      if (carryEl) body.appendChild(carryEl);
      body.appendChild(buildWeekSection(mon, sun));
    }

    // ══ RENDER: HOME PAGE ═════════════════════════════════════════════════════════

    function buildHomePage(mon, sun) {
      const wrap = document.createElement('div');
      const SVG_ARROW_SM = '<svg class="ih-icon ih-arrow-right" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l14 0" fill="none"/><path d="M15 16l4 -4l-4 -4" fill="none"/></svg>';

      // ── streak banner (only if >=2)
      const sc = DATA.streak.count;
      if (sc >= 2) {
        const sb = document.createElement('div');
        sb.className = 'home-streak';
        sb.innerHTML = '<div class="home-streak-num">' + sc + '</div>'
          + '<div class="home-streak-label">日連続達成🔥<br><span style="font-size:.72rem;opacity:.7">今日も完了すれば継続</span></div>';
        wrap.appendChild(sb);
      }

      // ── today tasks
      const todayKey = todayStr();
      const todayTasks = DATA.tasks[todayKey] || [];
      const todayDone = todayTasks.filter(t => t.done).length;
      const todayTotal = todayTasks.length;
      const todayPct = todayTotal ? Math.round(todayDone / todayTotal * 100) : 0;

      const todaySec = document.createElement('div');
      todaySec.className = 'home-section';
      const todayHead = document.createElement('div');
      todayHead.className = 'home-sec-head';
      todayHead.innerHTML = '<span class="home-sec-title">今日のタスク</span>'
        + '<button class="home-sec-goto" id="hgoto-week">今週へ ' + SVG_ARROW_SM + '</button>';
      todayHead.querySelector('#hgoto-week').onclick = () => navigateTo('week');
      todaySec.appendChild(todayHead);

      const todayBody = document.createElement('div');
      todayBody.className = 'home-sec-body';

      // progress bar
      const barWrap = document.createElement('div');
      barWrap.className = 'home-today-bar-wrap';
      barWrap.innerHTML = '<div class="home-today-bar"><div class="home-today-bar-fill" style="width:' + todayPct + '%"></div></div>'
        + '<span class="home-today-label">' + todayDone + '/' + todayTotal + '</span>';
      todayBody.appendChild(barWrap);

      const undone = todayTasks.filter(t => !t.done);
      const showTasks = undone.length > 0 ? undone.slice(0, 4) : todayTasks.slice(0, 4);
      const showMore = (undone.length > 0 ? undone.length : todayTasks.length) - 4;
      if (showTasks.length === 0) {
        const em = document.createElement('div');
        em.className = 'home-empty'; em.textContent = '今日のタスクなし';
        todayBody.appendChild(em);
      } else {
        for (const t of showTasks) {
          const row = document.createElement('div');
          row.className = 'home-task-row';
          const cb = document.createElement('input');
          cb.type = 'checkbox'; cb.className = 'home-task-cb'; if (t.done) cb.checked = true;
          cb.onchange = e => { t.done = e.target.checked; save(); render(); };
          const txt = document.createElement('span');
          txt.className = 'home-task-text' + (t.done ? ' done' : '');
          txt.textContent = t.text;
          txt.onclick = () => { t.done = !t.done; save(); render(); };
          row.appendChild(cb); row.appendChild(txt);
          todayBody.appendChild(row);
        }
        if (showMore > 0) {
          const more = document.createElement('div');
          more.className = 'home-more';
          more.textContent = '他 ' + showMore + ' 件';
          todayBody.appendChild(more);
        }
      }
      todaySec.appendChild(todayBody);
      wrap.appendChild(todaySec);

      // ── freq mini (未達成のみ、最大4件)
      const freqItems = DATA.freqTasks.filter(ft => {
        const key = freqPeriodKey(ft.type);
        return freqGetCount(ft, key) < ft.target;
      }).slice(0, 4);

      const freqSec = document.createElement('div');
      freqSec.className = 'home-section';
      const freqHead = document.createElement('div');
      freqHead.className = 'home-sec-head';
      freqHead.innerHTML = '<span class="home-sec-title">回数タスク（未達成）</span>'
        + '<button class="home-sec-goto" id="hgoto-freq">詳細へ ' + SVG_ARROW_SM + '</button>';
      freqHead.querySelector('#hgoto-freq').onclick = () => navigateTo('freq');
      freqSec.appendChild(freqHead);

      const freqBody = document.createElement('div');
      freqBody.className = 'home-sec-body';
      if (freqItems.length === 0) {
        const em = document.createElement('div'); em.className = 'home-empty';
        em.textContent = DATA.freqTasks.length === 0 ? '回数タスクなし' : 'すべて達成！';
        freqBody.appendChild(em);
      } else {
        const grid = document.createElement('div');
        grid.className = 'home-freq-grid';
        for (const ft of freqItems) {
          const key = freqPeriodKey(ft.type);
          const count = freqGetCount(ft, key);
          const pct = Math.min(100, Math.round(count / ft.target * 100));
          const mini = document.createElement('div');
          mini.className = 'home-freq-mini';
          mini.innerHTML = '<div class="home-freq-mini-title">' + esc(ft.text) + '</div>'
            + '<div class="home-freq-mini-count">' + count + '/' + ft.target + ' ' + freqTypeLabel(ft.type) + '</div>'
            + '<div class="home-freq-mini-bar"><div class="home-freq-mini-fill" style="width:' + pct + '%"></div></div>';
          grid.appendChild(mini);
        }
        freqBody.appendChild(grid);
        if (freqItems.length >= 4 && DATA.freqTasks.filter(ft => freqGetCount(ft, freqPeriodKey(ft.type)) < ft.target).length > 4) {
          const more = document.createElement('div'); more.className = 'home-more';
          const totalMiss = DATA.freqTasks.filter(ft => freqGetCount(ft, freqPeriodKey(ft.type)) < ft.target).length;
          more.textContent = '他 ' + (totalMiss - 4) + ' 件'; freqBody.appendChild(more);
        }
      }
      freqSec.appendChild(freqBody);
      wrap.appendChild(freqSec);

      // ── deadlines (直近3件)
      const dlItems = [...DATA.deadlines.filter(d => !d.done)]
        .sort((a, b) => a.dueDate.localeCompare(b.dueDate)).slice(0, 3);

      const dlSec = document.createElement('div');
      dlSec.className = 'home-section';
      const dlHead = document.createElement('div');
      dlHead.className = 'home-sec-head';
      dlHead.innerHTML = '<span class="home-sec-title">締切（直近3件）</span>'
        + '<button class="home-sec-goto" id="hgoto-dl">詳細へ ' + SVG_ARROW_SM + '</button>';
      dlHead.querySelector('#hgoto-dl').onclick = () => navigateTo('deadline');
      dlSec.appendChild(dlHead);

      const dlBody = document.createElement('div');
      dlBody.className = 'home-sec-body';
      if (dlItems.length === 0) {
        const em = document.createElement('div'); em.className = 'home-empty'; em.textContent = '締切タスクなし';
        dlBody.appendChild(em);
      } else {
        for (const dl of dlItems) {
          const u = dlUrgency(dl);
          const dotColor = u === 'overdue' || u === 'today-due' ? 'var(--danger)' : u === 'soon' ? 'var(--warn)' : 'var(--text-sub)';
          const row = document.createElement('div');
          row.className = 'home-dl-row';
          row.innerHTML = '<span class="home-dl-dot" style="background:' + dotColor + '"></span>'
            + '<span class="home-dl-text">' + esc(dl.text) + '</span>'
            + '<span class="home-dl-badge ' + u + '">' + dlLabel(dl) + '</span>';
          dlBody.appendChild(row);
        }
      }
      dlSec.appendChild(dlBody);
      wrap.appendChild(dlSec);

      // ── periods (進行中のみ)
      const pdItems = DATA.periods.filter(pd => !pd.done && pdUrgency(pd) === 'active').slice(0, 3);

      const pdSec = document.createElement('div');
      pdSec.className = 'home-section';
      const pdHead = document.createElement('div');
      pdHead.className = 'home-sec-head';
      pdHead.innerHTML = '<span class="home-sec-title">期間（進行中）</span>'
        + '<button class="home-sec-goto" id="hgoto-pd">詳細へ ' + SVG_ARROW_SM + '</button>';
      pdHead.querySelector('#hgoto-pd').onclick = () => navigateTo('period');
      pdSec.appendChild(pdHead);

      const pdBody = document.createElement('div');
      pdBody.className = 'home-sec-body';
      if (pdItems.length === 0) {
        const em = document.createElement('div'); em.className = 'home-empty'; em.textContent = '進行中の期間タスクなし';
        pdBody.appendChild(em);
      } else {
        for (const pd of pdItems) {
          const pct = pdProgress(pd);
          const row = document.createElement('div');
          row.className = 'home-pd-row';
          row.innerHTML = '<div class="home-pd-title">' + esc(pd.text) + '</div>'
            + '<div class="home-pd-meta">'
            + '<div class="home-pd-bar"><div class="home-pd-fill" style="width:' + pct + '%"></div></div>'
            + '<span class="home-pd-label">' + pdLabel(pd) + '</span>'
            + '</div>';
          pdBody.appendChild(row);
        }
      }
      pdSec.appendChild(pdBody);
      wrap.appendChild(pdSec);

      return wrap;
    }

    // ══ RENDER: SECTIONS ══════════════════════════════════════════════════════════

    function buildSectionTitle(text, style) {
      const el = document.createElement('div');
      el.className = 'sec-title';
      Object.assign(el.style, style || {});
      el.textContent = text;
      return el;
    }

    // helper: replace a named section in place without full re-render
    function replaceSection(sectionId, buildFn) {
      const old = document.querySelector('[data-section="' + sectionId + '"]');
      if (!old) { render(); return; } // section not in current page → full re-render
      const next = buildFn();
      next.dataset.section = sectionId;
      old.replaceWith(next);
      updateNavBadges();
    }

    // -- freq sections
    function buildFreqSections() {
      const wrapper = document.createElement('div');
      wrapper.dataset.section = 'freq';
      wrapper.appendChild(buildSectionTitle('回数タスク', { marginTop: '2px' }));

      const items = DATA.freqTasks;
      if (items.length === 0) {
        const em = document.createElement('div');
        em.className = 'freq-empty'; em.textContent = '回数タスクなし — ↺ で追加';
        wrapper.appendChild(em);
        return wrapper;
      }

      const grid = document.createElement('div');
      grid.className = 'freq-grid';
      for (const ft of items) {
        const key = freqPeriodKey(ft.type);
        grid.appendChild(buildFreqItem(ft, key));
      }
      wrapper.appendChild(grid);
      return wrapper;
    }

    // -- deadline section
    function buildDeadlineSection(mon, sun) {
      const wrap = document.createElement('div');
      wrap.dataset.section = 'deadline';

      const active = DATA.deadlines.filter(d => !d.done).sort((a, b) => a.dueDate.localeCompare(b.dueDate));
      const doneDl = DATA.deadlines.filter(d => d.done).sort((a, b) => a.dueDate.localeCompare(b.dueDate));
      const list = [...active, ...(DATA.dlShowDone ? doneDl : [])];

      if (list.length === 0) {
        const em = document.createElement('div');
        em.className = 'dl-empty'; em.textContent = '締切タスクなし — 📅 で追加';
        wrap.appendChild(em);
      } else {
        const card = document.createElement('div');
        card.className = 'dl-card';
        for (const dl of list) card.appendChild(buildDlItem(dl, mon, sun));
        wrap.appendChild(card);
      }
      return wrap;
    }

    // -- period section
    function buildPeriodSection(mon, sun) {
      const wrap = document.createElement('div');
      wrap.dataset.section = 'period';

      const active = DATA.periods.filter(p => !p.done).sort((a, b) => a.endDate.localeCompare(b.endDate));
      const donePd = DATA.periods.filter(p => p.done).sort((a, b) => a.endDate.localeCompare(b.endDate));
      const list = [...active, ...(DATA.pdShowDone ? donePd : [])];

      if (list.length === 0) {
        const em = document.createElement('div');
        em.className = 'pd-empty'; em.textContent = '期間タスクなし — 📆 で追加';
        wrap.appendChild(em);
      } else {
        const card = document.createElement('div');
        card.className = 'pd-card';
        for (const pd of list) card.appendChild(buildPeriodItem(pd, mon, sun));
        wrap.appendChild(card);
      }
      return wrap;
    }

    // -- week section
    function buildWeekSection(mon, sun) {
      const wrap = document.createElement('div');
      wrap.dataset.section = 'week';

      // section title row with inline progress
      let total = 0, done = 0;
      for (let i = 0; i < 7; i++) {
        const tl = DATA.tasks[ds(addDays(mon, i))] || [];
        total += tl.length; done += tl.filter(t => t.done).length;
      }
      const pct = total ? Math.round(done / total * 100) : 0;
      const sc = DATA.streak.count;

      const titleRow = document.createElement('div');
      titleRow.style.cssText = 'margin-top:10px';

      const titleLine = document.createElement('div');
      titleLine.style.cssText = 'display:flex;align-items:center;gap:8px;padding:4px 2px 0';
      titleLine.innerHTML = '<span class="sec-title" style="padding:0;flex:1">今週のタスク</span>'
        + '<span class="week-stats-label">' + done + '/' + total + '</span>'
        + (sc >= 2 ? '<span class="week-stats-streak">🔥 <b>' + sc + '</b>日連続</span>' : '');
      titleRow.appendChild(titleLine);

      const statsRow = document.createElement('div');
      statsRow.className = 'week-stats';
      statsRow.innerHTML = '<div class="week-stats-bar"><div class="week-stats-fill" style="width:' + pct + '%"></div></div>';
      titleRow.appendChild(statsRow);

      wrap.appendChild(titleRow);
      for (let i = 0; i < 7; i++) wrap.appendChild(buildDayCard(addDays(mon, i), mon, sun));
      return wrap;
    }

    // -- carry banner
    function buildCarryBanner(mon, wk) {
      const prevMon = addDays(mon, -7);
      if (DATA.carried['carry_' + wk]) return null;
      const carry = [];
      for (let i = 0; i < 7; i++)
        for (const t of (DATA.tasks[ds(addDays(prevMon, i))] || []))
          if (!t.done) carry.push({ ...t });
      if (carry.length === 0) return null;

      const b = document.createElement('div');
      b.className = 'carry-banner';
      b.innerHTML = '<span>⏩ 前週の未完了 <b style="color:var(--accent)">' + carry.length + '</b> 件</span>'
        + '<button class="carry-btn" id="doCarry">月曜に追加</button>'
        + '<button class="carry-dismiss" id="dismissCarry">' + ICONS.x + '</button>';
      b.querySelector('#doCarry').onclick = () => {
        const mk = ds(mon);
        if (!DATA.tasks[mk]) DATA.tasks[mk] = [];
        for (const t of carry) DATA.tasks[mk].push({ id: uid(), text: t.text, done: false });
        DATA.carried['carry_' + wk] = true; save(); render();
      };
      b.querySelector('#dismissCarry').onclick = () => { DATA.carried['carry_' + wk] = true; save(); render(); };
      return b;
    }

    // ══ RENDER: ITEMS ═════════════════════════════════════════════════════════════

    // -- freq item (card)
    function buildFreqItem(ft, key) {
      const count = freqGetCount(ft, key);
      const pct = Math.min(100, Math.round(count / ft.target * 100));
      const achieved = count >= ft.target;

      const card = document.createElement('div');
      card.className = 'freq-card';

      // top 2/3: tap area
      const top = document.createElement('div');
      top.className = 'freq-card-top' + (achieved ? ' achieved' : '');

      const title = document.createElement('div');
      title.className = 'freq-card-title';
      title.textContent = ft.text;

      const count_el = document.createElement('div');
      count_el.className = 'freq-card-count';
      count_el.textContent = count + '/' + ft.target;

      top.appendChild(title);
      top.appendChild(count_el);

      // tap +1 / longpress -1
      let pressTimer = null, didLong = false;
      const startPress = () => {
        didLong = false;
        pressTimer = setTimeout(() => {
          didLong = true;
          freqAddCount(ft, key, -1); save();
          replaceSection('freq', buildFreqSections); toast('-1');
        }, 500);
      };
      const endPress = () => {
        clearTimeout(pressTimer);
        if (!didLong) { freqAddCount(ft, key, 1); save(); replaceSection('freq', buildFreqSections); }
      };
      top.addEventListener('touchstart', e => { e.preventDefault(); startPress(); }, { passive: false });
      top.addEventListener('touchend', e => { e.preventDefault(); endPress(); });
      top.addEventListener('mousedown', startPress);
      top.addEventListener('mouseup', endPress);
      top.addEventListener('mouseleave', () => clearTimeout(pressTimer));

      // progress bar
      const bar = document.createElement('div');
      bar.className = 'freq-card-bar';
      const fill = document.createElement('div');
      fill.className = 'freq-card-bar-fill';
      fill.style.width = pct + '%';
      bar.appendChild(fill);

      // bottom 1/3: type label + actions
      const bot = document.createElement('div');
      bot.className = 'freq-card-bot';

      const typeLbl = document.createElement('span');
      typeLbl.className = 'freq-card-type';
      typeLbl.textContent = freqTypeLabel(ft.type);

      const editBtn = document.createElement('button');
      editBtn.className = 'freq-card-edit'; editBtn.innerHTML = ICONS.pen;
      editBtn.onclick = e => { e.stopPropagation(); openFreqModal(ft.id); };

      const delBtn = document.createElement('button');
      delBtn.className = 'freq-card-del'; delBtn.innerHTML = ICONS.trash;
      delBtn.onclick = e => {
        e.stopPropagation();
        DATA.freqTasks = DATA.freqTasks.filter(x => x.id !== ft.id);
        save(); replaceSection('freq', buildFreqSections);
      };

      bot.appendChild(typeLbl); bot.appendChild(editBtn); bot.appendChild(delBtn);

      card.appendChild(top);
      card.appendChild(bar);
      card.appendChild(bot);
      return card;
    }


    // -- deadline item
    function buildDlItem(dl, mon, sun) {
      const u = dlUrgency(dl), due = parseDate(dl.dueDate);
      const inWeek = due >= mon && due <= sun;

      const div = document.createElement('div');
      div.className = 'dl-item' + (dl.done ? ' done-dl' : '');

      const cb = document.createElement('input');
      cb.type = 'checkbox'; cb.className = 'dl-cb'; if (dl.done) cb.checked = true;
      cb.onchange = e => { dl.done = e.target.checked; save(); replaceSection('deadline', () => buildDeadlineSection(mon, sun)); };

      const textSpan = document.createElement('span');
      textSpan.className = 'dl-text'; textSpan.textContent = dl.text;
      textSpan.onclick = () => { dl.done = !dl.done; save(); replaceSection('deadline', () => buildDeadlineSection(mon, sun)); };

      const badge = document.createElement('span');
      badge.className = 'dl-badge ' + u; badge.textContent = dlLabel(dl);

      const editBtn = document.createElement('button');
      editBtn.className = 'dl-edit'; editBtn.innerHTML = ICONS.pen;
      editBtn.onclick = () => openDlModal(dl.id);

      const gotoBtn = document.createElement('button');
      gotoBtn.className = 'dl-goto'; gotoBtn.innerHTML = ICONS.arrow;
      if (!inWeek) gotoBtn.style.visibility = 'hidden';
      gotoBtn.onclick = () => {
        const cur = addDays(getMon(today()), offsetWeeks * 7);
        offsetWeeks = Math.round((getMon(due) - cur) / 604800000);
        save(); render(); toast(fmtShort(due) + 'の週へ移動');
      };

      const delBtn = document.createElement('button');
      delBtn.className = 'dl-del'; delBtn.innerHTML = ICONS.trash;
      delBtn.onclick = () => { DATA.deadlines = DATA.deadlines.filter(x => x.id !== dl.id); save(); render(); };

      div.appendChild(cb); div.appendChild(textSpan); div.appendChild(badge);
      div.appendChild(editBtn); div.appendChild(gotoBtn); div.appendChild(delBtn);
      return div;
    }

    // -- period item
    function buildPeriodItem(pd, mon, sun) {
      const u = pdUrgency(pd);
      const start = parseDate(pd.startDate), end = parseDate(pd.endDate);
      const inWeek = start <= sun && end >= mon;

      const div = document.createElement('div');
      div.className = 'pd-item' + (pd.done ? ' done-pd' : '');

      const row = document.createElement('div');
      row.className = 'pd-row';

      const cb = document.createElement('input');
      cb.type = 'checkbox'; cb.className = 'dl-cb'; if (pd.done) cb.checked = true;
      cb.onchange = e => { pd.done = e.target.checked; save(); replaceSection('period', () => buildPeriodSection(mon, sun)); };

      const textSpan = document.createElement('span');
      textSpan.className = 'pd-text'; textSpan.textContent = pd.text;
      textSpan.onclick = () => { pd.done = !pd.done; save(); replaceSection('period', () => buildPeriodSection(mon, sun)); };

      const badge = document.createElement('span');
      badge.className = 'pd-badge ' + u; badge.textContent = pdLabel(pd);

      const editBtn = document.createElement('button');
      editBtn.className = 'pd-edit'; editBtn.innerHTML = ICONS.pen;
      editBtn.onclick = () => openPdModal(pd.id);

      const gotoBtn = document.createElement('button');
      gotoBtn.className = 'dl-goto'; gotoBtn.innerHTML = ICONS.arrow;
      if (!inWeek) gotoBtn.style.visibility = 'hidden';
      gotoBtn.onclick = () => {
        const cur = addDays(getMon(today()), offsetWeeks * 7);
        offsetWeeks = Math.round((getMon(start) - cur) / 604800000);
        save(); render(); toast(fmtShort(start) + 'の週へ移動');
      };

      const delBtn = document.createElement('button');
      delBtn.className = 'pd-del'; delBtn.innerHTML = ICONS.trash;
      delBtn.onclick = () => { DATA.periods = DATA.periods.filter(x => x.id !== pd.id); save(); render(); };

      row.appendChild(cb); row.appendChild(textSpan); row.appendChild(badge);
      row.appendChild(editBtn); row.appendChild(gotoBtn); row.appendChild(delBtn);

      const range = document.createElement('div');
      range.className = 'pd-range';
      range.textContent = fmtShort(start) + ' 〜 ' + fmtShort(end);
      div.appendChild(range);

      const bar = document.createElement('div');
      bar.className = 'pd-bar';
      const fill = document.createElement('div');
      fill.className = 'pd-bar-fill' + (u === 'overdue' ? ' overdue' : '');
      fill.style.width = pdProgress(pd) + '%';
      bar.appendChild(fill); div.appendChild(bar);
      return div;
    }

    // -- day card
    function buildDayCard(d, mon, sun) {
      const key = ds(d);
      const tasks = DATA.tasks[key] || [];
      const isToday = key === todayStr();
      const doneCnt = tasks.filter(t => t.done).length;
      const dlsDay = DATA.deadlines.filter(dl => dl.dueDate === key);
      const pdsDay = DATA.periods.filter(pd => key >= pd.startDate && key <= pd.endDate);

      const card = document.createElement('div');
      card.className = 'day-card' + (isToday ? ' is-today' : '');
      card.dataset.key = key;
      if (!isToday && tasks.length === 0 && dlsDay.length === 0 && pdsDay.length === 0)
        card.classList.add('collapsed');

      // dot indicator
      const urgentDl = dlsDay.find(dl => !dl.done && daysUntil(dl.dueDate) <= 0);
      const anyDl = dlsDay.find(dl => !dl.done);
      const anyPd = pdsDay.find(pd => !pd.done);
      const dot = (anyDl || anyPd)
        ? '<span style="width:5px;height:5px;border-radius:50%;background:'
        + (urgentDl ? 'var(--danger)' : (anyDl ? 'var(--warn)' : 'var(--accent)'))
        + ';flex-shrink:0;display:inline-block"></span>'
        : '';

      const head = document.createElement('div');
      head.className = 'day-head';
      head.innerHTML = '<span class="day-label">' + DAY_LABELS[d.getDay()] + '</span>'
        + '<span class="day-date-str">' + fmtShort(d) + '</span>'
        + '<div class="day-meta">' + dot
        + '<span class="badge' + (doneCnt === tasks.length && tasks.length > 0 ? ' done-all' : '') + '">' + doneCnt + '/' + tasks.length + '</span>'
        + '<span class="collapse-icon">' + ICONS.chevDown + '</span></div>';
      head.onclick = () => card.classList.toggle('collapsed');
      card.appendChild(head);

      const ul = document.createElement('ul');
      ul.className = 'task-list';
      for (const t of tasks) ul.appendChild(buildTaskItem(t, key));
      for (const dl of dlsDay) ul.appendChild(buildDlChip(dl));
      for (const pd of pdsDay) ul.appendChild(buildPdChip(pd, key));
      card.appendChild(ul);

      card.appendChild(buildAddRow(key, d));
      return card;
    }

    // -- task item
    function buildTaskItem(t, key) {
      const li = document.createElement('li');
      li.className = 'task-item' + (t.done ? ' done' : '');
      li.dataset.id = t.id;

      const cb = document.createElement('input');
      cb.type = 'checkbox'; cb.className = 'cb'; if (t.done) cb.checked = true;
      cb.onchange = e => { t.done = e.target.checked; save(); render(); };

      const textSpan = document.createElement('span');
      textSpan.className = 'task-text'; textSpan.textContent = t.text;
      textSpan.onclick = () => { t.done = !t.done; save(); render(); };

      li.appendChild(cb); li.appendChild(textSpan);

      if (t.recurId) {
        const ri = document.createElement('span');
        ri.className = 'recur-icon'; ri.innerHTML = ICONS.repeat;
        ri.onclick = e => { e.stopPropagation(); openRecurModal(t.recurId); };
        li.appendChild(ri);
      }

      const editBtn = document.createElement('button');
      editBtn.className = 'edit-btn'; editBtn.innerHTML = ICONS.pen;
      editBtn.onclick = e => { e.stopPropagation(); startInlineEdit(li, textSpan, t, key); };
      li.appendChild(editBtn);

      const delBtn = document.createElement('button');
      delBtn.className = 'del-btn'; delBtn.innerHTML = ICONS.trash;
      delBtn.onclick = e => {
        e.stopPropagation();
        if (t.recurId && confirm('繰り返し設定も削除?\nOK=全削除 / キャンセル=今週だけ'))
          DATA.recurring = DATA.recurring.filter(r => r.id !== t.recurId);
        DATA.tasks[key] = (DATA.tasks[key] || []).filter(x => x.id !== t.id);
        save(); render();
      };
      li.appendChild(delBtn);
      return li;
    }

    function startInlineEdit(li, textSpan, t, key) {
      li.classList.add('editing');
      const inp = document.createElement('input');
      inp.className = 'task-edit-inp'; inp.value = t.text;
      li.replaceChild(inp, textSpan);
      inp.focus(); inp.select();
      const commit = () => {
        const v = inp.value.trim();
        if (v && v !== t.text) {
          t.text = v;
          if (t.recurId) { const rec = DATA.recurring.find(r => r.id === t.recurId); if (rec) rec.text = v; }
          save();
        }
        render();
      };
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); commit(); } if (e.key === 'Escape') render(); });
      inp.addEventListener('blur', commit);
    }

    // -- chips
    function buildDlChip(dl) {
      const u = dlUrgency(dl);

      const chip = document.createElement('div');

      const doAdd = () => {
        const v = inp.value.trim(); if (!v) return;

    let _syncTimer = null;

    function setSyncIndicator(state) {
      // Firebase モードのときだけ表示
      if (!adapter.isFirebaseReady && state !== 'offline') return;

      const el = document.getElementById('syncIndicator');
      const text = document.getElementById('syncText');
      if (!el || !text) return;

      // 状態クラスを入れ替え
      el.className = 'sync-indicator visible ' + state;

      const labels = {
        syncing: '同期中…',
        synced: '同期済み',
        error: '同期失敗',
        offline: 'オフライン',
      };
      text.textContent = labels[state] || '';

      // 「同期済み」は2秒後に非表示
      clearTimeout(_syncTimer);
      if (state === 'synced') {
        _syncTimer = setTimeout(() => {
          if (el) el.classList.remove('visible');
        }, 2000);
      }
    }

    // ── オンライン復帰時：保留中の変更をFirebaseに送信
    async function onNetworkOnline() {
      setOfflineBanner(false);
      if (!adapter.isFirebaseReady) return;

      if (adapter._pendingSync) {
        setSyncIndicator('syncing');
        try {
          // ローカルの最新データをFirebaseと比較して新しい方を採用
          const remote = await window.FB_SDK.getData(adapter.uid);
          const localTs = DATA.updatedAt || 0;
          const remoteTs = remote?.updatedAt || 0;

          if (localTs >= remoteTs) {
            // ローカルが新しい or 同じ → ローカルをFirebaseに送る
            await window.FB_SDK.setData(adapter.uid, DATA);
            setSyncIndicator('synced');
          } else {
            // リモートが新しい → リモートを採用
            DATA = Object.assign(init(), remote);
            adapter.saveLocal(DATA);
            render();
            setSyncIndicator('synced');
            toast('オンライン復帰：新しいデータに更新しました');
          }
          adapter._pendingSync = false;
        } catch (e) {
          console.warn('[onNetworkOnline] sync error:', e);
          setSyncIndicator('error');
        }
      } else {
        setSyncIndicator('synced');
      }
    }

    // ── オフライン時
    function onNetworkOffline() {
      if (adapter.mode === 'firebase') {
        setOfflineBanner(true);
        setSyncIndicator('offline');
      }
    }

    // ── ネットワークイベント登録
    window.addEventListener('online', onNetworkOnline);
    window.addEventListener('offline', onNetworkOffline);

    // 初期状態チェック
    if (!navigator.onLine && adapter.mode === 'firebase') {
      setOfflineBanner(true);
      setSyncIndicator('offline');
    }

    // ══ FIREBASE INIT & AUTH ══════════════════════════════════════════════════════

    // Firebase設定が保存されていれば自動初期化を試みる
    // （window.FB_SDK がモジュールスクリプトのロード完了後に呼ばれる）
    window.wtodoFirebaseInit = async function () {
      const cfg = loadFbConfig();
      if (!cfg) return; // 設定なし → ローカルモードのまま

      const sdk = window.FB_SDK;
      if (!sdk) return;

      // Firebase アプリを初期化
      const ok = sdk.init({
        apiKey: cfg.fbApiKey,
        projectId: cfg.fbProjectId,
        databaseURL: cfg.fbDbUrl,
        authDomain: cfg.fbProjectId + '.firebaseapp.com',
      });
      if (!ok) { updateSyncStatus('⚠️ 初期化失敗'); return; }

      // 認証状態を監視
      sdk.onAuthStateChanged(async user => {
        if (user) {
          adapter.setFirebaseMode(sdk._db, user.uid);
          setSyncIndicator('syncing');

          await syncFromFirebase(user.uid);

          adapter.startRemoteListener(remoteData => {
            DATA = Object.assign(init(), remoteData);
            adapter.saveLocal(DATA);
            render();
            setSyncIndicator('synced');
            toast('他の端末から同期しました');
          });

          setSyncIndicator('synced');
          updateSyncStatus('✅ Firebase同期中');
          render();
        } else {
          adapter.setLocalMode();
          const el = document.getElementById('syncIndicator');
          if (el) el.classList.remove('visible');
          updateSyncStatus('─ 未ログイン');
        }
      });
    };

    // Firebase からデータを取得してローカルとマージ（初回同期）
    async function syncFromFirebase(uid) {
      try {
        const remote = await window.FB_SDK.getData(uid);
        if (remote) {
          const localTs = DATA.updatedAt || 0;
          const remoteTs = remote.updatedAt || 0;

          if (remoteTs > localTs) {
            // リモートが新しい → リモートを採用
            DATA = Object.assign(init(), remote);
            adapter.saveLocal(DATA);
            toast('Firebaseから最新データを取得しました');
          } else if (localTs > remoteTs) {
            // ローカルが新しい → ローカルをFirebaseに送る
            await window.FB_SDK.setData(uid, DATA);
            toast('ローカルの新しいデータをFirebaseに送信しました');
          }
          // 同タイムスタンプ → 何もしない
        } else {
          // Firebaseにデータなし → ローカルを移行
          await window.FB_SDK.setData(uid, DATA);
          toast('ローカルデータをFirebaseに移行しました');
        }
      } catch (e) {
        console.warn('[syncFromFirebase] error:', e);
        setSyncIndicator('error');
        toast('同期に失敗しました（オフライン？）');
      }
    }

    // Settings画面のステータス表示を更新
    function updateSyncStatus(label) {
      const el = document.getElementById('fbStatus');
      if (el) el.textContent = label;
    }

    // Googleログイン
    async function signInWithGoogle() {
      const sdk = window.FB_SDK;
      if (!sdk?._auth) { toast('先に設定を保存してください'); return; }
      try {
        updateSyncStatus('⏳ ログイン中…');
        await sdk.signInWithGoogle();
        // onAuthStateChanged が発火して自動的に処理される
      } catch (e) {
        console.warn('[signInWithGoogle] error:', e);
        updateSyncStatus('⚠️ ログイン失敗');
        toast('ログインに失敗しました');
      }
    }

    // ログアウト
    async function signOutFromFirebase() {
      const sdk = window.FB_SDK;
      if (!sdk?._auth) return;
      try {
        adapter.stopRemoteListener();
        await sdk.signOut();
        adapter.setLocalMode();
        updateSyncStatus('─ ログアウト済み');
        toast('ログアウトしました');
        render();
      } catch (e) {
        console.warn('[signOut] error:', e);
        toast('ログアウトに失敗しました');
      }
    }



    // ══ STARTUP ═══════════════════════════════════════════════════════════════════
    cleanCarried();
    render();

    // Firebase モジュールスクリプトに初期化完了を通知
    window.dispatchEvent(new Event('wtodo-ready'));

    // ── Service Worker 登録
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => { });
      });
    }

  </script>
</body>

</html>
